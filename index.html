<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>FarmCalc - แอปพลิเคชันประเมินและคำนวณผลผลิตอ้อยเพื่อการเกษตร</title>
    <meta name="description" content="FarmCalc เว็บไซต์เครื่องมือช่วยคำนวณสำหรับเกษตรกร ประเมินผลผลิตอ้อยต่อไร่ คำนวณสูตรปุ๋ยมาตรฐาน และคำนวณขนาดพื้นที่ดินอย่างแม่นยำ">
    <meta name="keywords" content="FarmCalc, คำนวณผลผลิตอ้อย, ประเมินอ้อยต่อไร่, คำนวณปุ๋ยอ้อย, เครื่องมือการเกษตร, คำนวณพื้นที่ดิน">
    <meta name="author" content="จักรพรรณ">
    
    <meta property="og:title" content="FarmCalc - แอปพลิเคชันประเมินผลผลิตอ้อยเพื่อการเกษตร">
    <meta property="og:description" content="คำนวณผลผลิตอ้อยต่อไร่ บันทึกประวัติ และคำนวณปุ๋ยได้ง่ายๆ ผ่านมือถือ">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
            -webkit-tap-highlight-color: transparent; /* ลบกรอบสีฟ้าเวลาจิ้มบน iOS */
        }

        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .phone-container {
            background: rgba(255, 255, 255, 0.9); /* ปรับความทึบขึ้นเล็กน้อยเพื่อแก้ปัญหาเลเยอร์บังบน iOS */
            width: 100%;
            max-width: 450px;
            min-height: 85vh;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            padding: 28px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .screen {
            display: none;
            position: relative;
            z-index: 10; /* ดันหน้าจอให้มาอยู่ด้านบนสุดเสมอ */
        }

        .screen.active {
            display: block;
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 24px;
            color: #1b5e20;
            letter-spacing: -0.5px;
        }

        /* 📱 ปรับแต่งปุ่มกดให้รองรับการกดบนหน้าจอสัมผัส iOS เต็มรูปแบบ */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 54px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            margin-bottom: 14px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 20; /* ดันปุ่มให้อยู่เหนือน้ำหนักของข้อความ */
            touch-action: manipulation; /* บังคับให้ตอบสนองต่อการจิ้มทันที ไม่รอดีเลย์ */
        }

        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn i { margin-right: 12px; font-size: 18px; }

        .btn-fertilizer { background: linear-gradient(135deg, #4caf50, #2e7d32); }
        .btn-record { background: linear-gradient(135deg, #0288d1, #01579b); }
        .btn-area { background: linear-gradient(135deg, #ff9800, #e65100); }
        .btn-sugarcane { background: #6750a4; } 
        .btn-save-record { background: #7d5260; } 
        .btn-back { background: #424242; margin-top: 15px; box-shadow: none; }

        .form-group { margin-bottom: 16px; position: relative; z-index: 15; }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #455a64;
        }

        input, select {
            width: 100%;
            height: 48px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 15px;
            background-color: #fafafa;
            outline: none;
            /* แก้ไขช่องป้อนข้อมูลบน iOS ให้จิ้มง่ายและซูมไม่เพี้ยน */
            -webkit-appearance: none;
            appearance: none;
        }

        input:focus, select:focus { border-color: #6750a4; background-color: white; }

        .rounds-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
            position: relative;
            z-index: 15;
        }

        .round-box {
            background: rgba(255, 255, 255, 0.6);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #ddd;
        }

        .round-box label { font-size: 12px; }

        .result-text-block {
            display: none; 
            color: #6750a4;
            font-size: 15px;
            font-weight: 500;
            text-align: center;
            line-height: 1.7;
            margin: 20px 0;
            white-space: pre-line;
        }

        .save-zone {
            display: none; 
        }

        .record-item {
            background: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 14px;
            margin-bottom: 12px;
            position: relative;
            border: 1px solid #eee;
            z-index: 15;
        }

        .record-actions {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 15px;
            z-index: 30; /* ดันกลุ่มปุ่มแก้ไข/ลบให้อยู่บนสุดเพื่อให้จิ้มติดบน iOS */
        }

        .action-btn { 
            background: none; 
            border: none; 
            cursor: pointer; 
            font-size: 18px; 
            padding: 5px;
            touch-action: manipulation;
        }
        
        .btn-edit-item { color: #0288d1; }
        .btn-delete-item { color: #d32f2f; }
    </style>
</head>
<body>

<div class="phone-container">

    <div id="main-screen" class="screen active">
        <h2 style="color:#1b5e20; margin-bottom:8px;">🚜 FarmCalc</h2>
        <p style="text-align:center; font-size:12px; color:#666; margin-bottom:24px;">By จักรพรรณ</p>
        <button class="btn btn-fertilizer" onclick="switchScreen('fertilizer-screen')">
            <i class="fa-solid fa-flask"></i> คำนวณปุ๋ย
        </button>
        <button class="btn btn-record" onclick="switchScreen('record-screen')">
            <i class="fa-solid fa-list-check"></i> บันทึกผลผลิต
        </button>
        <button class="btn btn-area" onclick="switchScreen('area-screen')">
            <i class="fa-solid fa-location-dot"></i> คำนวณพื้นที่
        </button>
        <button class="btn btn-sugarcane" onclick="switchScreen('sugarcane-screen')">
            <i class="fa-solid fa-seedling"></i> ประเมินอ้อย (ตัน/ไร่)
        </button>
    </div>

    <div id="sugarcane-screen" class="screen">
        <h2 id="sugarcane-title">ประเมินผลผลิตอ้อย (ตัน/ไร่)</h2>
        <input type="hidden" id="editing-id" value="">
        
        <div class="form-group">
            <label>ระยะห่างระหว่างร่องอ้อย</label>
            <select id="cane-row-spacing">
                <option value="1.60">1.60 เมตร</option>
                <option value="1.65">1.65 เมตร</option>
                <option value="1.70">1.70 เมตร</option>
                <option value="1.75">1.75 เมตร</option>
                <option value="1.80">1.80 เมตร</option>
            </select>
        </div>

        <label>ระบุจำนวนลำต้นที่นับได้ต่อ 5 เมตร (สุ่มนับ 4 จุด)</label>
        <div class="rounds-grid">
            <div class="round-box">
                <label>รอบที่ 1 (ลำ)</label>
                <input type="number" id="round-1" placeholder="0">
            </div>
            <div class="round-box">
                <label>รอบที่ 2 (ลำ)</label>
                <input type="number" id="round-2" placeholder="0">
            </div>
            <div class="round-box">
                <label>รอบที่ 3 (ลำ)</label>
                <input type="number" id="round-3" placeholder="0">
            </div>
            <div class="round-box">
                <label>รอบที่ 4 (ลำ)</label>
                <input type="number" id="round-4" placeholder="0">
            </div>
        </div>

        <div class="form-group">
            <label>ค่าน้ำหนักเฉลี่ยต่อลำ</label>
            <select id="cane-weight-avg">
                <option value="1.0">1.0 กก./ลำ</option>
                <option value="1.2">1.2 กก./ลำ</option>
                <option value="1.5" selected>1.5 กก./ลำ</option>
                <option value="1.8">1.8 กก./ลำ</option>
                <option value="2.0">2.0 กก./ลำ</option>
                <option value="2.2">2.2 กก./ลำ</option>
                <option value="2.5">2.5 กก./ลำ</option>
            </select>
        </div>

        <button class="btn btn-sugarcane" id="btn-cane-submit" onclick="processCalculate()">
            คำนวณผลผลิตอ้อย
        </button>

        <div id="cane-result-text" class="result-text-block"></div>

        <div id="save-data-zone" class="save-zone">
            <div class="form-group">
                <input type="text" id="cane-name" placeholder="ระบุชื่อแปลงอ้อยเพื่อบันทึก">
            </div>
            <button class="btn btn-save-record" onclick="saveRecordToList()">
                <i class="fa-solid fa-floppy-disk"></i> บันทึกข้อมูลแปลงนี้
            </button>
        </div>
        
        <button class="btn btn-back" onclick="cancelEditCane()">กลับหน้าหลัก</button>
    </div>

    <div id="record-screen" class="screen">
        <h2>📜 ประวัติประเมินอ้อย</h2>
        <div id="record-list"></div>
        <button class="btn btn-back" onclick="switchScreen('main-screen')">กลับหน้าหลัก</button>
    </div>

    <div id="area-screen" class="screen">
        <h2>📐 คำนวณพื้นที่ดิน</h2>
        <div class="form-group"><label>ความกว้าง (เมตร)</label><input type="number" id="area-width"></div>
        <div class="form-group"><label>ความยาว (เมตร)</label><input type="number" id="area-length"></div>
        <button class="btn btn-area" onclick="calcArea()">คำนวณ</button>
        <div id="area-result" class="result-text-block" style="display:block; color:#ff9800;"></div>
        <button class="btn btn-back" onclick="switchScreen('main-screen')">กลับหน้าหลัก</button>
    </div>

    <div id="fertilizer-screen" class="screen">
        <h2>🧪 คำนวณปุ๋ยอ้อย</h2>
        <div class="form-group"><label>พื้นที่ (ไร่)</label><input type="number" id="fert-area"></div>
        <div class="form-group"><label>เป้าหมาย (ตัน/ไร่)</label><input type="number" id="fert-target"></div>
        <button class="btn btn-fertilizer" onclick="calcFertilizer()">คำนวณ</button>
        <div id="fert-result" class="result-text-block" style="display:block; color:#2e7d32;"></div>
        <button class="btn btn-back" onclick="switchScreen('main-screen')">กลับหน้าหลัก</button>
    </div>

</div>

<script>
    let savedPlots = JSON.parse(localStorage.getItem('farmCalcPlots')) || [];
    let currentCalculatedTons = 0;

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if(screenId === 'record-screen') displayRecords();
    }

    function processCalculate() {
        const rowSpacing = parseFloat(document.getElementById('cane-row-spacing').value);
        const weightAvg = parseFloat(document.getElementById('cane-weight-avg').value);
        
        const r1 = parseFloat(document.getElementById('round-1').value) || 0;
        const r2 = parseFloat(document.getElementById('round-2').value) || 0;
        const r3 = parseFloat(document.getElementById('round-3').value) || 0;
        const r4 = parseFloat(document.getElementById('round-4').value) || 0;

        if (r1 > 0 && r2 > 0 && r3 > 0 && r4 > 0) {
            const avgStalks = (r1 + r2 + r3 + r4) / 4;
            const stalksPerRai = (avgStalks * 1600) / (rowSpacing * 5);
            const tonsPerRai = (stalksPerRai * weightAvg) / 1000;
            
            currentCalculatedTons = tonsPerRai;

            const resultBox = document.getElementById('cane-result-text');
            resultBox.innerText = 
                `จำนวนลำต้นเฉลี่ย: ${avgStalks.toFixed(1)} ลำ/5เมตร\n` +
                `ประมาณการลำต้น: ${Math.round(stalksPerRai).toLocaleString()} ลำ/ไร่\n` +
                `น้ำหนักเฉลี่ยต่อลำที่เลือก: ${weightAvg.toFixed(2)} กก.\n\n` +
                `คาดการณ์ผลผลิต: ${tonsPerRai.toFixed(2)} ตันต่อไร่`;
            
            resultBox.style.display = "block";
            document.getElementById('save-data-zone').style.display = "block";
        } else {
            alert("กรุณากรอกจำนวนลำให้ครบทั้ง 4 รอบก่อนครับ");
        }
    }

    function saveRecordToList() {
        const name = document.getElementById('cane-name').value.trim() || "แปลงไม่ได้ระบุชื่อ";
        const editingId = document.getElementById('editing-id').value;
        
        const r1 = parseFloat(document.getElementById('round-1').value);
        const r2 = parseFloat(document.getElementById('round-2').value);
        const r3 = parseFloat(document.getElementById('round-3').value);
        const r4 = parseFloat(document.getElementById('round-4').value);
        const rowSpacing = parseFloat(document.getElementById('cane-row-spacing').value);
        const weightAvg = parseFloat(document.getElementById('cane-weight-avg').value);

        const now = new Date();
        const dateText = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;

        if (editingId !== "") {
            const idx = savedPlots.findIndex(p => p.id === parseInt(editingId));
            if(idx !== -1) {
                savedPlots[idx] = { 
                    ...savedPlots[idx], 
                    plotName: name, 
                    tonsPerRai: currentCalculatedTons, 
                    date: dateText + " (แก้ไข)", 
                    rounds: [r1, r2, r3, r4], 
                    rowSpacing, 
                    weightAvg 
                };
            }
            alert("อัปเดตข้อมูลเรียบร้อย!");
        } else {
            savedPlots.push({ 
                id: Date.now(), 
                plotName: name, 
                tonsPerRai: currentCalculatedTons, 
                date: dateText, 
                rounds: [r1, r2, r3, r4], 
                rowSpacing, 
                weightAvg 
            });
            alert("บันทึกข้อมูลสำเร็จ!");
        }

        localStorage.setItem('farmCalcPlots', JSON.stringify(savedPlots));
        cancelEditCane();
        switchScreen('record-screen');
    }

    function displayRecords() {
        const container = document.getElementById('record-list');
        if (savedPlots.length === 0) {
            container.innerHTML = "<p style='text-align:center; color:#888; padding:20px;'>ยังไม่มีประวัติประเมินผลผลิต</p>";
            return;
        }
        container.innerHTML = ""; 
        savedPlots.forEach(item => {
            container.innerHTML += `
                <div class="record-item">
                    <strong style="color:#1b5e20;">📍 แปลง: ${item.plotName}</strong>
                    <div style="font-size:14px; margin-top:5px;">📈 ผลผลิต: <span style="font-weight:bold; color:#6750a4;">${item.tonsPerRai.toFixed(2)} ตัน/ไร่</span></div>
                    <div style="font-size:11px; color:#888; margin-top:4px;"><i class="fa-regular fa-clock"></i> ${item.date}</div>
                    <div class="record-actions">
                        <button class="action-btn btn-edit-item" onclick="editRecord(${item.id})"><i class="fa-solid fa-pen"></i></button>
                        <button class="action-btn btn-delete-item" onclick="deleteRecord(${item.id})"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
        });
    }

    function editRecord(id) {
        const p = savedPlots.find(x => x.id === id);
        if(p) {
            document.getElementById('editing-id').value = p.id;
            document.getElementById('cane-name').value = p.plotName;
            document.getElementById('cane-row-spacing').value = p.rowSpacing;
            document.getElementById('cane-weight-avg').value = p.weightAvg;
            document.getElementById('round-1').value = p.rounds[0];
            document.getElementById('round-2').value = p.rounds[1];
            document.getElementById('round-3').value = p.rounds[2];
            document.getElementById('round-4').value = p.rounds[3];
            
            document.getElementById('sugarcane-title').innerText = "✏️ แก้ไขการประเมิน";
            processCalculate();
            switchScreen('sugarcane-screen');
        }
    }

    function deleteRecord(id) {
        if(confirm("คุณต้องการลบข้อมูลประวัตินี้ใช่หรือไม่?")) {
            savedPlots = savedPlots.filter(x => x.id !== id);
            localStorage.setItem('farmCalcPlots', JSON.stringify(savedPlots));
            displayRecords();
        }
    }

    function cancelEditCane() {
        document.getElementById('editing-id').value = "";
        document.getElementById('round-1').value = "";
        document.getElementById('round-2').value = "";
        document.getElementById('round-3').value = "";
        document.getElementById('round-4').value = "";
        document.getElementById('cane-name').value = "";
        document.getElementById('cane-result-text').style.display = "none";
        document.getElementById('save-data-zone').style.display = "none";
        document.getElementById('sugarcane-title').innerText = "ประเมินผลผลิตอ้อย (ตัน/ไร่)";
        switchScreen('main-screen');
    }

    function calcArea() {
        const w = parseFloat(document.getElementById('area-width').value) || 0;
        const l = parseFloat(document.getElementById('area-length').value) || 0;
        if(w>0 && l>0) {
            const sqm = w * l;
            const rai = Math.floor(sqm / 1600);
            document.getElementById('area-result').innerText = `รวมพื้นที่: ${rai} ไร่ (${sqm.toLocaleString()} ตร.ม.)`;
        }
    }
    
    function calcFertilizer() {
        const area = parseFloat(document.getElementById('fert-area').value) || 0;
        const target = parseFloat(document.getElementById('fert-target').value) || 0;
        if(area>0 && target>0) {
            document.getElementById('fert-result').innerText = `พื้นที่ ${area} ไร่ เป้าหมาย ${target} ตัน/ไร่\nแนะนำใช้ปุ๋ยปริมาณประมาณ ${(target*1.3*area/21).toFixed(1)} กระสอบ`;
        }
    }
</script>

</body>
</html>
